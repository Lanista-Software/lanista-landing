<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 440" fill="none">
  <circle cx="220" cy="220" r="164" fill="#EBF2FA"/>
  <!-- circuit nodes -->
  <g stroke="#9ABFE5" stroke-width="6" stroke-linecap="round">
    <line x1="120" y1="150" x2="150" y2="180"/>
    <line x1="320" y1="150" x2="290" y2="180"/>
    <line x1="120" y1="300" x2="152" y2="286"/>
    <line x1="320" y1="300" x2="288" y2="286"/>
  </g>
  <g fill="#C2D9EF">
    <circle cx="116" cy="146" r="10"/>
    <circle cx="324" cy="146" r="10"/>
    <circle cx="116" cy="304" r="10"/>
    <circle cx="324" cy="304" r="10"/>
  </g>
  <!-- antenna -->
  <line x1="220" y1="128" x2="220" y2="150" stroke="#25598E" stroke-width="8" stroke-linecap="round"/>
  <circle cx="220" cy="118" r="12" fill="#F59E0B"/>
  <!-- robot head -->
  <rect x="140" y="150" width="160" height="140" rx="34" fill="#2F73B6"/>
  <rect x="140" y="150" width="160" height="140" rx="34" fill="#25598E" opacity="0.12"/>
  <!-- eyes -->
  <circle cx="185" cy="210" r="22" fill="#EBF2FA"/>
  <circle cx="255" cy="210" r="22" fill="#EBF2FA"/>
  <circle cx="185" cy="210" r="10" fill="#1A4065"/>
  <circle cx="255" cy="210" r="10" fill="#1A4065"/>
  <!-- smile -->
  <path d="M186 250 q34 26 68 0" stroke="#EBF2FA" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- ears -->
  <rect x="122" y="196" width="18" height="44" rx="9" fill="#498CD0"/>
  <rect x="300" y="196" width="18" height="44" rx="9" fill="#498CD0"/>
  <!-- sparkle -->
  <path d="M322 232 l6 16 l16 6 l-16 6 l-6 16 l-6 -16 l-16 -6 l16 -6 z" fill="#22C55E"/>
</svg>
